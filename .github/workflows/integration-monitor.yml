name: Integration Monitoring Agent

on:
  schedule:
    - cron: '*/30 * * * *'   # Every 30 minutes
  workflow_dispatch:           # Allow manual trigger from GitHub UI
    inputs:
      dry_run:
        description: 'Dry run (no changes to Jira or Slack)'
        required: false
        default: 'false'
        type: boolean
      lookback_hours:
        description: 'Hours to look back for tickets'
        required: false
        default: '1'
        type: string

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd integration-monitor
          pip install -r requirements.txt

      - name: Run Integration Monitor
        env:
          JIRA_BASE_URL: https://jira.lyft.net
          JIRA_USERNAME: ${{ secrets.JIRA_USERNAME }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          LYFT_AI_PROXY_TOKEN: ${{ secrets.LYFT_AI_PROXY_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID || 'C09KBAUMZMJ' }}
          LOOKBACK_HOURS: 1
          DRY_RUN: false
        run: |
          cd integration-monitor
          DRY_RUN_FLAG=""
          LOOKBACK="${{ github.event.inputs.lookback_hours || '1' }}"

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi

          python agent.py $DRY_RUN_FLAG --lookback $LOOKBACK

      - name: Upload agent log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-log-${{ github.run_id }}
          path: integration-monitor/agent.log
          retention-days: 14
